<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="1~45 범위에서 중복 없는 6개 로또 추천 번호를 생성하는 페이지" />
  <link rel="canonical" href="https://example.com/lotto-recommend.html" />
  <link rel="stylesheet" href="assets/styles.css" />
  <title>로또 추천 번호 생성기 | 웹 프로덕트 랩</title>
</head>
<body>
  <header class="site-header">
    <div class="container site-header-inner">
      <a class="brand" href="index.html">웹 프로덕트 랩</a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="index.html">홈</a>
        <a href="site-map.html">사이트맵</a>
        <a href="my-brain.html">마이 브레인</a>
        <a href="lotto-recommend.html">로또 추천</a>
        <a href="guide-odds.html">확률 가이드</a>
        <a href="guide-budget.html">예산 가이드</a>
        <a href="guide-myths.html">오해 바로잡기</a>
        <a href="about.html">소개</a>
        <a href="contact.html">문의</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <article class="article">
      <h1>로또 추천 번호 생성기</h1>
      <p class="meta">기존 기능 유지용 페이지</p>
      <p>
        버튼을 누르면 1~45 범위에서 중복 없는 6개 번호를 추천합니다. 결과는 오름차순으로 정렬되며,
        생성 기록이 아래 로그에 누적됩니다.
      </p>

      <div class="lotto-numbers" id="lotto-numbers" aria-live="polite"></div>
      <div class="lotto-controls">
        <button type="button" id="draw-btn">추천번호 생성</button>
        <button type="button" id="reroll-btn" class="secondary-btn">다시 생성</button>
        <button type="button" id="clear-log-btn" class="secondary-btn">로그 초기화</button>
      </div>
      <div class="lotto-meta">
        <span>추천 범위: 1~45</span>
        <span>선택 수: 6개</span>
        <span>생성 시각: <strong id="draw-seed">-</strong></span>
      </div>
      <div class="lotto-log" id="lotto-log"></div>
    </article>
  </main>

  <footer>
    <div class="container footer-inner">
      <div>© 2026 웹 프로덕트 랩</div>
      <div><a href="about.html">소개</a> · <a href="site-map.html">사이트맵</a> · <a href="my-brain.html">마이 브레인</a> · <a href="lotto-recommend.html">로또 추천</a> · <a href="contact.html">문의</a> · <a href="privacy.html">개인정보처리방침</a> · <a href="terms.html">이용약관</a> · <a href="editorial-policy.html">편집 정책</a></div>
    </div>
  </footer>

  <script>
    const numbersEl = document.getElementById("lotto-numbers");
    const logEl = document.getElementById("lotto-log");
    const seedEl = document.getElementById("draw-seed");

    function createNumbers() {
      const pool = Array.from({ length: 45 }, (_, i) => i + 1);
      const picks = [];
      while (picks.length < 6) {
        const idx = Math.floor(Math.random() * pool.length);
        picks.push(pool.splice(idx, 1)[0]);
      }
      return picks.sort((a, b) => a - b);
    }

    function renderNumbers(nums) {
      numbersEl.innerHTML = "";
      nums.forEach((num) => {
        const item = document.createElement("div");
        item.className = "lotto-ball";
        item.textContent = num;
        numbersEl.appendChild(item);
      });
    }

    function addLog(nums) {
      const row = document.createElement("div");
      row.className = "lotto-log-item";
      const ts = new Date().toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      row.innerHTML = "<strong>" + ts + "</strong> " + nums.join(", ");
      logEl.prepend(row);
    }

    function draw(withLog) {
      const nums = createNumbers();
      renderNumbers(nums);
      seedEl.textContent = new Date().toLocaleTimeString("ko-KR");
      if (withLog) addLog(nums);
    }

    document.getElementById("draw-btn").addEventListener("click", () => draw(true));
    document.getElementById("reroll-btn").addEventListener("click", () => draw(false));
    document.getElementById("clear-log-btn").addEventListener("click", () => {
      logEl.innerHTML = "";
    });

    draw(true);
  </script>
</body>
</html>
